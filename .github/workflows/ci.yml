name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:versions
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build
      - run: pnpm pack --pack-destination "$RUNNER_TEMP"

  rust:
    name: Rust 1.85
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --manifest-path rust/Cargo.toml --check
      - run: cargo clippy --manifest-path rust/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --manifest-path rust/Cargo.toml --all-features
      - run: cargo doc --manifest-path rust/Cargo.toml --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo package --manifest-path rust/Cargo.toml

  rust-windows:
    name: Rust 1.85 (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo test --manifest-path rust/Cargo.toml --all-features
