name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: pnpm run check:versions
      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build
      - run: pnpm pack --pack-destination "$RUNNER_TEMP"
      - run: cargo fmt --manifest-path rust/Cargo.toml --check
      - run: cargo clippy --manifest-path rust/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --manifest-path rust/Cargo.toml --all-features
      - run: cargo doc --manifest-path rust/Cargo.toml --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - run: cargo package --manifest-path rust/Cargo.toml

  crates:
    name: Publish crates.io
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85.0
      - id: existing
        run: |
          STATUS="$(curl --silent --output /dev/null --write-out "%{http_code}" \
            "https://crates.io/api/v1/crates/widevin/${{ needs.verify.outputs.version }}")"
          if [ "$STATUS" = "200" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi
      - id: auth
        if: steps.existing.outputs.published != 'true'
        uses: rust-lang/crates-io-auth-action@v1
      - if: steps.existing.outputs.published != 'true'
        run: cargo publish --manifest-path rust/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  npm:
    name: Publish npm
    needs:
      - verify
      - crates
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: existing
        run: |
          if npm view "widevin@${{ needs.verify.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.existing.outputs.published != 'true'
        run: pnpm publish --no-git-checks --provenance
